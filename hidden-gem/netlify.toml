[build]
publish = "."
functions = "netlify/functions"

[functions]
  [functions."*"]
  node_bundler = "esbuild"

# Pretty-URL rewrite: /about -> /about.html etc. force = false keeps real
# files (css, images, the .html files themselves) winning. Functions at
# /.netlify/* are handled by Netlify natively and don't need a redirect
# rule -- the previous /.netlify/* pass-through was rejected at deploy
# time ("Invalid /.netlify path in redirect source") and cluttered every
# build log.
[[redirects]]
from = "/:slug"
to = "/:slug.html"
status = 200
force = false
